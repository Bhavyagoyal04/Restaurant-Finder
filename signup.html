<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up to Restaurant Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sign Up for Restaurant Finder</h1>
    </header>

    <div class="container">
        <div class="auth-section">
            <h2>Create Account</h2>
            <form id="signupForm">
                <input type="text" id="newUsername" placeholder="Choose a username">
                <input type="email" id="email" placeholder="Enter your email">
                <input type="password" id="newPassword" placeholder="Choose a password">
                <button type="submit" id="signupBtn">Sign Up</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Restaurant Menu Finder. All rights reserved.</p>
    </footer>

    <script src="signup.js"></script>
</body>
</html>
