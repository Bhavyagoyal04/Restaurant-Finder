<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login To Restaurant Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to Restaurant Finder</h1>
    </header>

    <div class="container">
        <div class="auth-section">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Enter username">
                <input type="password" id="password" placeholder="Enter password">
                <button type="submit" id="loginBtn">Login</button>
            </form>
            <div class="social-login">
                <p>Or login with:</p>
                <button id="googleLogin" class="social-btn">Google</button>
                <button id="facebookLogin" class="social-btn">Facebook</button>
            </div>
            <p>New user? <a href="signup.html">Sign up here</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Restaurant Menu Finder. All rights reserved.</p>
    </footer>

    <script src="login.js"></script>
</body>
</html>
